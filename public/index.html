<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Budget Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <header>
        <h1>💰 Personal Budget Dashboard</h1>
        <p>Manage your budget envelopes efficiently.</p>
    </header>

    <div class="grid">

        
        <div class="left">

            
        <section class="card">

                <h2>Create Envelope</h2>

                <input
                    type="text"
                    id="title"
                    placeholder="Envelope Name">

                <input
                    type="number"
                    id="balance"
                    placeholder="Balance">

                <button id="create-btn">
                    Create Envelope
                </button>

            </section>

            <section class="card">

                <h2>Transfer Money</h2>

                <select id="from">
                    <option value="">From</option>
                </select>

                <select id="to">
                    <option value="">To</option>
                </select>

                <input
                    type="number"
                    id="amount"
                    placeholder="Transfer Amount">

                <button id="transfer-btn">
                    Transfer
                </button>

            </section>

        </div>


        <div class="right">

            <section class="card">

                <div class="card-header">

                    <h2>Envelopes</h2>

                    <span id="count">
                        0 Envelopes
                    </span>

                </div>

                <div id="envelope-list">

                </div>

            </section>

        </div>

    </div>

</div>

<script src="main.js"></script>

</body>
</html>
